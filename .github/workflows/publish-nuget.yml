name: Publish NuGet package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: NuGet package version (for example, 1.3.0)
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve package version
        id: package-version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}' -replace '^v', ''
          }
          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
            throw "Unsupported package version: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build NuGet package
        shell: pwsh
        run: ./nuget/pack-nuget.ps1 -Version '${{ steps.package-version.outputs.version }}'

      - name: Test local package installation
        shell: pwsh
        run: ./nuget/test-nuget.ps1 -Version '${{ steps.package-version.outputs.version }}' -PackagePath './nuget/artifacts/iSCP.${{ steps.package-version.outputs.version }}.nupkg'

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: iSCP-${{ steps.package-version.outputs.version }}
          path: ./nuget/artifacts/*.nupkg
          if-no-files-found: error

      - name: Log in to NuGet.org
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish package to NuGet.org
        shell: pwsh
        run: >-
          dotnet nuget push
          './nuget/artifacts/iSCP.${{ steps.package-version.outputs.version }}.nupkg'
          --api-key '${{ steps.nuget-login.outputs.NUGET_API_KEY }}'
          --source 'https://api.nuget.org/v3/index.json'
          --skip-duplicate
